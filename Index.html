<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waguri Script Hub ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            color: #fff6f0;
        }

        /* Moving Background */
        .waguri-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(125deg, #1f0b1a 0%, #331c2c 30%, #4a2a3f 65%, #1f0e1c 100%);
            background-size: 300% 300%;
            animation: waguriShift 18s ease infinite;
        }

        @keyframes waguriShift {
            0% { background-position: 0% 30%; }
            50% { background-position: 100% 70%; }
            100% { background-position: 0% 30%; }
        }

        /* Floating particles */
        .floating-waguri {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }
        
        .wag-particle {
            position: absolute;
            font-size: 20px;
            opacity: 0.6;
            filter: drop-shadow(0 0 4px #ff99cc);
            animation: floatWaguri linear infinite;
            pointer-events: none;
        }
        
        @keyframes floatWaguri {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            15% { opacity: 0.8; }
            85% { opacity: 0.8; }
            100% { transform: translateY(-120px) rotate(360deg); opacity: 0; }
        }

        /* Sakura petals */
        .sakura-petal {
            position: absolute;
            background: #ffb7c5;
            width: 10px;
            height: 10px;
            border-radius: 80% 0 60% 40%;
            opacity: 0.5;
            transform: rotate(45deg);
            pointer-events: none;
            animation: fallSakura linear infinite;
        }
        
        @keyframes fallSakura {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
            20% { opacity: 0.7; }
            80% { opacity: 0.5; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        /* Music Player */
        .music-player {
            position: fixed;
            bottom: 22px;
            right: 22px;
            background: rgba(20, 8, 18, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 200;
            border: 1px solid #ff9acb;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 8px 20px rgba(255, 105, 180, 0.2);
        }
        
        .music-player:hover {
            background: #ff69b4cc;
            transform: scale(1.03);
        }
        
        .music-icon {
            font-size: 24px;
            animation: wagMusicBeat 1s infinite ease;
        }
        
        @keyframes wagMusicBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); text-shadow: 0 0 12px #ff69b4; }
        }
        
        .music-text {
            font-size: 13px;
            font-weight: 600;
            color: #ffe4f0;
        }

        /* Container */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 30px 24px 70px;
            position: relative;
            z-index: 2;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 54px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffe6f0, #ffb3d9, #ff69b4, #ffb347);
            background-size: 300% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: waguriShine 4s linear infinite;
            cursor: pointer;
        }
        
        @keyframes waguriShine {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        
        .header p {
            color: #ffcfdf;
            margin-top: 10px;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 5px 20px;
            border-radius: 60px;
            font-size: 14px;
        }

        /* Script Cards */
        .scripts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
            gap: 28px;
            margin: 40px 0 30px;
        }
        
        .script-card {
            background: rgba(20, 8, 18, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 128, 179, 0.5);
            transition: all 0.3s;
            box-shadow: 0 18px 30px -12px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }
        
        .script-card:hover {
            transform: translateY(-8px);
            border-color: #ff80b3;
            background: rgba(30, 12, 25, 0.75);
        }
        
        .script-title {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(120deg, #ffffff, #ffb8d9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        
        .script-desc {
            font-size: 13px;
            color: #ffdddd;
            margin-bottom: 18px;
            opacity: 0.85;
        }
        
        .loadstring-box {
            background: #0a0308cc;
            padding: 14px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 11px;
            color: #c0ffb0;
            word-break: break-all;
            margin-bottom: 18px;
            border-left: 4px solid #ff69b4;
        }
        
        .copy-btn {
            background: linear-gradient(115deg, #ff69b4, #ff3b8c);
            border: none;
            padding: 10px 0;
            width: 100%;
            border-radius: 100px;
            font-weight: bold;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .copy-btn:hover {
            background: #ff3f8e;
            transform: scale(1.02);
        }

        /* Admin Panel */
        .add-script {
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(20px);
            border-radius: 36px;
            padding: 28px;
            margin-top: 50px;
            border: 1px solid #ff99cc;
        }
        
        .add-script h3 {
            font-size: 22px;
            margin-bottom: 18px;
            color: #ffb7d2;
        }
        
        .add-script input, .add-script textarea {
            width: 100%;
            background: #2d1a26;
            border: 1px solid #ff85b9;
            padding: 12px 16px;
            border-radius: 26px;
            margin-bottom: 16px;
            color: white;
            font-family: monospace;
        }
        
        .add-script button {
            background: #ff69b4;
            padding: 12px 28px;
            border-radius: 32px;
            border: none;
            font-weight: bold;
            color: #1e0c15;
            cursor: pointer;
        }
        
        .footer {
            text-align: center;
            font-size: 12px;
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px dashed #ff85b9;
            color: #ffb7cc;
        }

        @media (max-width: 650px) {
            .header h1 { font-size: 38px; }
        }
    </style>
</head>
<body>

<div class="waguri-bg"></div>
<div class="floating-waguri" id="waguriParticles"></div>

<div class="music-player" id="musicWidget">
    <span class="music-icon">🎀</span>
    <span class="music-text">Waguri BGM ～☆</span>
    <audio id="bgmAudio" loop></audio>
</div>

<div class="container">
    <div class="header">
        <h1 id="waguriTitle">🎀 WAGURI SCRIPT HUB 🎀</h1>
        <p>✦ premium roblox scripts | murder mystery 2 | auto-joiner | bomb jump ✦</p>
    </div>

    <div class="scripts-grid" id="scriptsContainer">
        <div style="grid-column: 1/-1; text-align: center; color: #ffbbd4;">✨ loading waguri magic... ✨</div>
    </div>

    <div class="add-script" id="secretAdminPanel" style="display: none;">
        <h3>🌸 WAGURI ADMIN (add your own script) 🌸</h3>
        <input type="text" id="scriptName" placeholder="Script name">
        <input type="text" id="scriptDesc" placeholder="Short description">
        <textarea id="scriptLoadstringRaw" rows="3" placeholder="loadstring(game:HttpGet('https://...'))()"></textarea>
        <button id="addScriptBtn">💾 add to hub</button>
    </div>

    <div class="footer">
        <span>💗 made with waguri energy 💗</span><br>
        <span>follow tiktok: @waguriii.wow</span>
    </div>
</div>

<script>
    // Create floating particles
    const particlesContainer = document.getElementById('waguriParticles');
    const wagEmojis = ['🌸', '💖', '🎀', '✨', '💕', '🍥', '⭐', '💗'];
    
    function createParticle() {
        const particle = document.createElement('div');
        particle.classList.add('wag-particle');
        particle.innerHTML = wagEmojis[Math.floor(Math.random() * wagEmojis.length)];
        particle.style.left = Math.random() * 100 + '%';
        particle.style.fontSize = (Math.random() * 18 + 14) + 'px';
        particle.style.animationDuration = (Math.random() * 5 + 5) + 's';
        particlesContainer.appendChild(particle);
        setTimeout(() => particle.remove(), 8000);
    }
    
    function createPetal() {
        const petal = document.createElement('div');
        petal.classList.add('sakura-petal');
        petal.style.left = Math.random() * 100 + '%';
        petal.style.width = (Math.random() * 8 + 6) + 'px';
        petal.style.height = (Math.random() * 8 + 6) + 'px';
        petal.style.animationDuration = Math.random() * 5 + 4 + 's';
        document.body.appendChild(petal);
        setTimeout(() => petal.remove(), 7000);
    }
    
    setInterval(createParticle, 700);
    setInterval(createPetal, 550);
    
    // Music
    const audio = document.getElementById('bgmAudio');
    const musicWidget = document.getElementById('musicWidget');
    let musicPlaying = false;
    audio.src = 'https://cdn.pixabay.com/download/audio/2022/05/16/audio_c8c8d6b3c0.mp3';
    audio.loop = true;
    audio.volume = 0.3;
    
    musicWidget.addEventListener('click', () => {
        if (musicPlaying) {
            audio.pause();
            musicPlaying = false;
        } else {
            audio.play().catch(e => console.log('click first'));
            musicPlaying = true;
        }
    });
    
    // Scripts data
    let scriptsLibrary = [
        {
            id: 1,
            name: "🌸 WAGURI MM2 HUB",
            description: "Complete Murder Mystery 2 utility: silent aim, esp, auto farm, fling, role display, wallbang, delta bypass.",
            loadstring: `loadstring(game:HttpGet("https://raw.githubusercontent.com/Waguriiiii/Murder-mystery-2/refs/heads/main/Waguri.lua"))()`
        },
        {
            id: 2,
            name: "🎀 WAGURI BOMB JUMP",
            description: "Insane bomb jump / fake bomb effect + super jump for MM2.",
            loadstring: `loadstring(game:HttpGet("https://raw.githubusercontent.com/waguri-mm2/Murder-mystery-2/refs/heads/main/Waguri-bomb-jump.lua"))()`
        },
        {
            id: 3,
            name: "💖 Waguri Silent Aim",
            description: "Advanced silent aim + wallbang with murderer tracking.",
            loadstring: `--[[ Waguri Silent Aim ]] --\nloadstring(game:HttpGet("https://raw.githubusercontent.com/Waguriiiii/Murder-mystery-2/main/silent.lua"))()`
        }
    ];
    
    // Load saved scripts
    function loadStored() {
        const stored = localStorage.getItem('waguri_scripts');
        if (stored) {
            try {
                const custom = JSON.parse(stored);
                const existingIds = new Set(scriptsLibrary.map(s => s.id));
                const newScripts = custom.filter(c => !existingIds.has(c.id));
                scriptsLibrary = [...scriptsLibrary, ...newScripts];
            } catch(e) {}
        }
    }
    
    function saveScripts() {
        const custom = scriptsLibrary.filter(s => s.id > 3);
        localStorage.setItem('waguri_scripts', JSON.stringify(custom));
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function renderScripts() {
        const container = document.getElementById('scriptsContainer');
        if (!container) return;
        
        if (scriptsLibrary.length === 0) {
            container.innerHTML = '<div style="grid-column:1/-1; text-align:center;">✨ no scripts yet ✨</div>';
            return;
        }
        
        container.innerHTML = scriptsLibrary.map(script => `
            <div class="script-card" data-id="${script.id}">
                <div class="script-title">${escapeHtml(script.name)}</div>
                <div class="script-desc">${escapeHtml(script.description)}</div>
                <div class="loadstring-box" id="loadstr-${script.id}">${escapeHtml(script.loadstring.substring(0, 80))}${script.loadstring.length > 80 ? '…' : ''}</div>
                <button class="copy-btn" data-id="${script.id}">📋 COPY FULL LOADSTRING</button>
            </div>
        `).join('');
        
        // Attach copy events
        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const card = btn.closest('.script-card');
                const id = parseInt(card.dataset.id);
                const script = scriptsLibrary.find(s => s.id === id);
                if (script) {
                    navigator.clipboard.writeText(script.loadstring);
                    const original = btn.innerHTML;
                    btn.innerHTML = '✅ COPIED!';
                    setTimeout(() => { btn.innerHTML = original; }, 1500);
                }
            });
        });
    }
    
    // Add custom script
    function addScript() {
        const name = document.getElementById('scriptName').value.trim();
        const desc = document.getElementById('scriptDesc').value.trim();
        const loadstr = document.getElementById('scriptLoadstringRaw').value.trim();
        
        if (!name || !loadstr) {
            alert('Please fill name and loadstring');
            return;
        }
        
        const newId = Math.max(...scriptsLibrary.map(s => s.id), 0) + 1;
        scriptsLibrary.push({
            id: newId,
            name: name,
            description: desc || 'Waguri custom script',
            loadstring: loadstr
        });
        
        saveScripts();
        renderScripts();
        
        document.getElementById('scriptName').value = '';
        document.getElementById('scriptDesc').value = '';
        document.getElementById('scriptLoadstringRaw').value = '';
        
        alert('✅ Script added!');
    }
    
    // Secret admin panel (click title 5 times)
    let clickCount = 0;
    const title = document.getElementById('waguriTitle');
    title.addEventListener('click', () => {
        clickCount++;
        if (clickCount === 5) {
            document.getElementById('secretAdminPanel').style.display = 'block';
            clickCount = 0;
        }
        setTimeout(() => { clickCount = 0; }, 3000);
    });
    
    document.getElementById('addScriptBtn').addEventListener('click', addScript);
    
    // Initialize
    loadStored();
    renderScripts();
    
    console.log('🌸 Waguri Hub loaded!');
</script>
</body>
</html>
